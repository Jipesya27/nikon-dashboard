services:
  db:
    image: mariadb:11
    container_name: lychee-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: lychee_root
      MYSQL_DATABASE: lychee
      MYSQL_USER: lychee
      MYSQL_PASSWORD: lychee_pass
    volumes:
      - /opt/lychee/db:/var/lib/mysql
    networks:
      - lychee-net

  lychee:
    image: lycheeorg/lychee:latest
    container_name: lychee-app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3010:80"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lychee
      DB_USERNAME: lychee
      DB_PASSWORD: lychee_pass
      APP_URL: http://192.168.18.63:3010
      APP_KEY: "base64:kVv/vFfnWWu9iAZvsobRnoJV5SUR04t1oCqFFVRlg80="
      TIMEZONE: Asia/Jakarta
      PHP_TZ: Asia/Jakarta
    volumes:
      - /opt/lychee/conf:/conf
      - /opt/lychee/logs:/logs
      - /mnt/photos:/uploads
    networks:
      - lychee-net

networks:
  lychee-net:
    driver: bridge
