name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview = APK, production = AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - main
    paths:
      - 'android-app/**'

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: android-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_API_BASE_URL: https://altanikindo.com

      - name: Build info
        run: |
          echo "Build sedang diproses di server Expo."
          echo "Download APK di: https://expo.dev/accounts/jipesya/projects/jipesyaalta/builds"
